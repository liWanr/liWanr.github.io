[[project.extra_javascript]]
path = "assets/javascripts/extra.js"
async = true

[project.theme]
language = "zh"                     # 设置语言,zh简中, en英文, zh-Hant繁中, zh-TW台湾
custom_dir = "overrides"            # 模板覆盖目录，用于自定义主题模板
font.code = "JetBrains Mono"        # 代码块等宽字体
icon.logo = "local/logo"
icon.repo = "simple/github"
favicon = "assets/favicon.png"      # 设置浏览器标签页或标题栏显示的图标

features = [
    "announce.dismiss",
    "content.action.view",          # 在页面顶部添加查看链接，指向 GitHub 上的对应文件，方便读者查看源内容
    "content.code.annotate",        # 在代码关键位置添加图标 + 鼠标悬停提示
    "content.code.copy",            # 在代码块中添加一键复制按钮，无需先选中内容
    "content.footnote.tooltips",    # 将脚注渲染为行内工具提示（tooltip），无需跳转即可阅读
    "content.tabs.link",            # 同步切换内容标签页标题相同的标签
    "content.tooltips",             # 美化 title 提示渲染
    "navigation.indexes",           # 章节索引页功能，允许文档直接挂载到章节下（适合概览页）
    "navigation.path",              # 显示路径面包屑导航（在页面标题上方）
    "navigation.tabs",              # 在大屏幕下，将顶级章节渲染为头部下方的菜单标签页
    "navigation.tabs.sticky",       # 粘性标签页：向下滚动时标签页固定在头部下方始终可见
    "navigation.top",               # 当用户向下滚动后开始向上滚动时，显示“返回顶部”按钮
    "navigation.tracking",          # 锚点跟踪：地址栏 URL 会自动更新为当前高亮的目录锚点
    "search.highlight",             # 搜索跳转后高亮匹配内容
    "toc.follow"                    # 目录锚点跟随：侧边栏会自动滚动，让当前激活的锚点始终可见
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "跟随系统"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "浅色模式"
accent = "liwanr"
primary = "liwanr"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "深色模式"
accent = "liwanr"
primary = "liwanr"

# Markdown 扩展
[project.markdown_extensions.abbr]                          # 启用缩写支持
[project.markdown_extensions.attr_list]                     # 启用属性列表（用于按钮、class 等）
[project.markdown_extensions.def_list]                      # 启用定义列表语法
[project.markdown_extensions.footnotes]                     # 启用脚注语法支持
[project.markdown_extensions.md_in_html]                    # 允许在 HTML 中写 Markdown
[project.markdown_extensions.tables]                        # 启用 Markdown 表格支持
[project.markdown_extensions.pymdownx.blocks.admonition]    # 新，警示块
[project.markdown_extensions.pymdownx.blocks.caption]       # 新，图片标题与对齐支持
[project.markdown_extensions.pymdownx.blocks.definition]    # 新，定义块
[project.markdown_extensions.pymdownx.blocks.details]       # 新，折叠警示块
[project.markdown_extensions.pymdownx.blocks.html]          # 新，自定义 HTML 块支持
[project.markdown_extensions.pymdownx.caret]                # 上标/下标语法
[project.markdown_extensions.pymdownx.inlinehilite]         # 行内代码高亮
[project.markdown_extensions.pymdownx.magiclink]            # 魔法链接
[project.markdown_extensions.pymdownx.mark]                 # 文本高亮标记
[project.markdown_extensions.pymdownx.progressbar]          # 进度条语法
[project.markdown_extensions.pymdownx.smartsymbols]         # 将某些字符序列转换为相应的符号，例如版权符号或分数
[project.markdown_extensions.pymdownx.tilde]                # 删除线与下标语法

[project.markdown_extensions.toc]                           # 启用目录锚点永久链接
permalink = "§"
permalink_title = "锚点"
slugify = {object = "pymdownx.slugs.slugify", kwds = { case = "lower" }}

[project.markdown_extensions.pymdownx.blocks.tab]           # 新，内容标签页
alternate_style = true
combine_header_slug = true
slugify = {object = "pymdownx.slugs.slugify", kwds = { case = "lower" }}

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"           # 使用 Twemoji 表情集
emoji_generator = "zensical.extensions.emoji.to_svg"        # 将 emoji 渲染为 SVG
options.custom_icons = ["overrides/.icons"]                 # 自定义 SVG 图标目录

[project.markdown_extensions.pymdownx.highlight]
guess_lang = true
linenums = true                                             # 为所有代码块添加行号
linenums_style = "pymdownx-inline"                          # 行号样式
auto_title = false                                          # 自动为所有代码块添加标题 ，显示所用语言的名称
line_spans = "__span"                                       # 用于行级高亮的 span 标识
anchor_linenums = true                                      # 允许代码行号作为锚点
pygments_lang_class = true                                  # 给代码块添加语言 class

[project.markdown_extensions.pymdownx.keys]                 # 启用键盘按键高亮显示
key_map = {"a"= "a", "b"= "b", "c"= "c", "d"= "d", "e"= "e", "f"= "f", "g"= "g", "h"= "h", "i"= "i", "j"= "j", "k"= "k", "l"= "l", "m"= "m", "n"= "n", "o"= "o", "p"= "p", "q"= "q", "r"= "r", "s"= "s", "t"= "t", "u"= "u", "v"= "v", "w"= "w", "x"= "x", "y"= "y", "z"= "z", "A"= "A", "B"= "B", "C"= "C", "D"= "D", "E"= "E", "F"= "F", "G"= "G", "H"= "H", "I"= "I", "J"= "J", "K"= "K", "L"= "L", "M"= "M", "N"= "N", "O"= "O", "P"= "P", "Q"= "Q", "R"= "R", "S"= "S", "T"= "T", "U"= "U", "V"= "V", "W"= "W", "X"= "X", "Y"= "Y", "Z"= "Z", "asterisk"="*", "at"="@","and"="&","sharp"="#", "percent"="%", "caret"="^", "dollar"="$"}

[project.markdown_extensions.pymdownx.quotes]               # 更现代的引用
callouts = true

[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md"]                 # 自动引入缩写定义文件

[project.markdown_extensions.pymdownx.superfences]          # 启用 Mermaid 图表
custom_fences = [{name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }]

[project.markdown_extensions.pymdownx.tasklist]             # 使用自定义复选框样式
custom_checkbox = true

[project.extra]
generator = false                                           # 移除 “Made with Zensical” 声明

analytics.provider = "google"
analytics.property = "G-JJZ9XN4L96"

annotate.Bash = [".s2"]

[project.extra.tags]                    # 使用标签对任何页面进行分类，标签将作为页面元数据的一部分
Net = "NetWork"
Tech = "Technology"
Factoid = "Factoid"
Git = "Git"

[project.extra.status]
new = "最新发布"

